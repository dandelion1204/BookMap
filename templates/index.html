<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教科書版本查詢系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --bg-light: #f0f2f5;

            --color-kangxi: #0ea573;
            --bg-kangxi: #ecfdf5;
            --color-hanlin: #3372d8;
            --bg-hanlin: #eff6ff;
            --color-nani: #cd860b;
            --bg-nani: #fffbeb;
            --color-default: #5e6065;
            --bg-default: #f3f4f6;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 50px 0;
            color: var(--text-dark);
            font-weight: 400; /* 全域設定為正常字體 */
        }

        .main-card {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(118, 75, 162, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f1f3f5;
            padding-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .app-title {
            margin: 0;
            font-weight: 500; /* 改為中等字體，不加粗 */
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .level-switcher {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #e9ecef;
            display: flex;
            gap: 2px;
        }
        .level-switcher .btn-custom {
            padding: 8px 20px;
            font-size: 1.05rem;
            border: none;
            color: var(--text-muted);
            font-weight: 400; /* 取消粗體 */
        }
        .level-switcher .btn-custom.active {
            color: white;
            background: var(--primary-gradient);
            font-weight: 400;
        }

        .search-group {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            min-width: 400px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: "";
            width: 5px;
            height: 22px;
            background: var(--primary-gradient);
            margin-right: 12px;
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 400; /* 取消粗體 */
            transition: all 0.2s ease;
            border: 1px solid #e9ecef;
            background: white;
            color: #495057;
            font-size: 1.1rem;
        }
        .btn-custom.active {
            background: var(--primary-gradient);
            color: white !important;
            border: none;
        }

        .table-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #f1f3f5;
            display: none;
            margin-top: 35px;
            background: white;
        }

        .table {
            margin-bottom: 0;
            font-size: 1.15rem;
        }
        .table thead th {
            font-weight: 500; /* 改為中等字體 */
            color: var(--text-dark);
            font-size: 1.1rem;
            padding: 22px;
            background-color: #f8f9fa;
        }
        .table tbody td {
            padding: 24px 15px;
            vertical-align: middle;
            color: var(--text-dark);
            border-bottom: 1px solid #f1f3f5;
            font-weight: 400; /* 內容不加粗 */
        }
        .table tbody tr:hover {
            background-color: #fbfbfe;
        }

        .grade-text {
            font-weight: 400; /* 取消粗體 */
            color: var(--text-dark);
            font-size: 1.2rem;
            display: inline-block;
        }

        .version-badge {
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 400; /* 標籤文字不加粗 */
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-kangxi { background-color: var(--bg-kangxi); color: var(--color-kangxi); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-hanlin { background-color: var(--bg-hanlin); color: var(--color-hanlin); border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-nani { background-color: var(--bg-nani); color: var(--color-nani); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-default { background-color: var(--bg-default); color: var(--color-default); }

        #sync-btn {
            background: #27a9ae;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 500;
            font-size: 1.05rem;
        }
        #loading-spinner { display: none; padding: 60px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header-section">
            <div class="d-flex align-items-center gap-3">
                <h2 class="app-title">教科書查詢系統</h2>
                <div class="level-switcher">
                    <button type="button" class="btn btn-custom active" onclick="switchLevel('國小', this)">國小</button>
                    <button type="button" class="btn btn-custom" onclick="switchLevel('國中', this)">國中</button>
                </div>
            </div>

            <div class="app-actions d-flex gap-2">
                <div class="search-group">
                    <input type="text" id="search-input" class="form-control" placeholder="搜尋校名（如：青埔）" style="border-radius: 12px; font-size: 1.1rem;">
                    <button class="btn btn-outline-success" style="border-radius: 12px; min-width: 80px;" onclick="handleSearch()">搜尋</button>
                </div>
                <button id="sync-btn" class="btn" onclick="handleSync()">更新資料庫</button>
            </div>
        </div>

        <div class="mb-5">
            <label class="section-title">選擇行政區</label>
            <div id="district-list" class="d-flex flex-wrap gap-2">
                {% for name in districts %}
                    <button class="btn btn-custom btn-zone" onclick="fetchSchools('{{ name }}', this)">
                        {{ name }}
                    </button>
                {% endfor %}
            </div>
        </div>

        <div id="school-section" class="mb-5" style="display: none;">
            <label class="section-title" id="school-section-title">選擇學校</label>
            <div id="school-list" class="d-flex flex-wrap gap-2"></div>
        </div>

        <div id="loading-spinner" class="text-center">
            <div class="spinner-grow text-primary" role="status"></div>
            <div class="mt-3 text-muted">正在讀取...</div>
        </div>

        <div id="result-table" class="table-container">
            <div class="p-4 bg-white border-bottom">
                <h4 class="mb-0 text-dark" id="display-school-name">📍 版本明細</h4>
            </div>
            <div class="table-responsive">
                <table class="table align-middle table-hover">
                    <thead class="text-center">
                        <tr>
                            <th width="15%">年級</th>
                            <th>國語</th>
                            <th>數學</th>
                            <th>自然/生活</th>
                            <th>社會</th>
                            <th>英語</th>
                        </tr>
                    </thead>
                    <tbody id="book-data-body" class="text-center"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLevel = '國小';

    function formatVersionBadge(text) {
        if (!text || text === '-' || text === 'null') return '<span class="text-muted" style="opacity: 0.5;">-</span>';
        let badgeClass = 'badge-default';
        let displayText = text;

        if (text.includes('康軒') || text === '康') {
            badgeClass = 'badge-kangxi';
            displayText = '康軒';
        } else if (text.includes('翰林') || text === '翰') {
            badgeClass = 'badge-hanlin';
            displayText = '翰林';
        } else if (text.includes('南一') || text === '南') {
            badgeClass = 'badge-nani';
            displayText = '南一';
        }
        return `<span class="version-badge ${badgeClass}">${displayText}</span>`;
    }

    async function fetchBookDetails(schoolName, btnElement) {
        if (btnElement) {
            document.querySelectorAll('#school-list .btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
        const bookBody = document.getElementById('book-data-body');
        const spinner = document.getElementById('loading-spinner');
        const resultTable = document.getElementById('result-table');

        document.getElementById('display-school-name').innerText = `📍 ${schoolName}`;
        resultTable.style.display = 'none';
        spinner.style.display = 'block';

        try {
            const response = await fetch(`/api/schools/${encodeURIComponent(schoolName)}/?level=${currentLevel}`);
            const books = await response.json();

            spinner.style.display = 'none';
            resultTable.style.display = 'block';
            bookBody.innerHTML = '';

            if (books.length === 0) {
                bookBody.innerHTML = '<tr><td colspan="6" class="p-5 text-muted">暫無資料</td></tr>';
                return;
            }

            books.forEach(book => {
                bookBody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><span class="grade-text">${book.grade}</span></td>
                        <td>${formatVersionBadge(book.sub_chinese)}</td>
                        <td>${formatVersionBadge(book.sub_math)}</td>
                        <td>${formatVersionBadge(book.sub_science)}</td>
                        <td>${formatVersionBadge(book.sub_social)}</td>
                        <td>${formatVersionBadge(book.sub_english)}</td>
                    </tr>
                `);
            });

            // 成功獲取資料後，自動捲動到網頁最底部
            setTimeout(() => {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);

        } catch (e) {
            spinner.style.display = 'none';
            bookBody.innerHTML = '<tr><td colspan="6" class="p-5 text-danger">資料讀取失敗</td></tr>';
        }
    }

    async function switchLevel(level, btnElement) {
        if (currentLevel === level) return;
        currentLevel = level;
        document.querySelectorAll('.level-switcher .btn-custom').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById('school-section').style.display = 'none';
        document.getElementById('result-table').style.display = 'none';
        const districtList = document.getElementById('district-list');
        districtList.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        try {
            const response = await fetch(`/api/get_districts/?level=${encodeURIComponent(level)}`);
            const data = await response.json();
            districtList.innerHTML = '';
            data.districts.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-custom btn-zone';
                btn.innerText = name;
                btn.onclick = () => fetchSchools(name, btn);
                districtList.appendChild(btn);
            });
        } catch (e) { districtList.innerHTML = '載入失敗'; }
    }

    async function handleSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;
        document.querySelectorAll('.btn-zone').forEach(btn => btn.classList.remove('active'));
        document.getElementById('result-table').style.display = 'none';
        const schoolSection = document.getElementById('school-section');
        const schoolList = document.getElementById('school-list');
        schoolSection.style.display = 'block';
        document.getElementById('school-section-title').innerText = `🔍 搜尋結果: "${query}" (${currentLevel})`;
        schoolList.innerHTML = '搜尋中...';
        try {
            const response = await fetch(`/api/schools/search/?search=${encodeURIComponent(query)}&level=${currentLevel}`);
            const data = await response.json();
            const uniqueSchools = [...new Set(data.map(item => item.school))];
            schoolList.innerHTML = uniqueSchools.length === 0 ? '<span class="text-danger">找不到學校</span>' : '';
            uniqueSchools.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-custom';
                btn.innerText = name;
                btn.onclick = () => fetchBookDetails(name, btn);
                schoolList.appendChild(btn);
            });
            if (uniqueSchools.length === 1) schoolList.firstChild.click();
        } catch (e) { schoolList.innerHTML = '搜尋失敗'; }
    }

    async function fetchSchools(districtName, btnElement) {
        document.querySelectorAll('.btn-zone').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById('result-table').style.display = 'none';
        document.getElementById('school-section').style.display = 'block';
        document.getElementById('school-section-title').innerText = `🏢 ${districtName}區學校 (${currentLevel})`;
        const schoolList = document.getElementById('school-list');
        schoolList.innerHTML = '載入中...';
        const response = await fetch(`/api/schools/?district=${encodeURIComponent(districtName)}&level=${currentLevel}`);
        const data = await response.json();
        schoolList.innerHTML = '';
        data.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-custom';
            btn.innerText = item.school;
            btn.onclick = () => fetchBookDetails(item.school, btn);
            schoolList.appendChild(btn);
        });
    }

    async function handleSync() {
        const syncBtn = document.getElementById('sync-btn');
        if (!confirm('確認同步最新版本資料？')) return;
        syncBtn.disabled = true;
        syncBtn.innerHTML = '同步中...';
        try {
            const response = await fetch('/api/sync/', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
            const data = await response.json();
            alert(data.message);
            location.reload();
        } catch (e) { alert('同步出錯'); syncBtn.disabled = false; syncBtn.innerText = '🔄 更新資料庫'; }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
</body>
</html>
